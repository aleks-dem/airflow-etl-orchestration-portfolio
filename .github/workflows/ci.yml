name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  syntax-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Python syntax
        run: |
          python -m py_compile dags/*.py utils/*.py scripts/*.py

  dag-integration-tests:
    runs-on: ubuntu-latest
    needs: syntax-check
    env:
      AIRFLOW_VERSION: '2.9.3'
      PYTHON_VERSION: '3.11'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Airflow and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "apache-airflow==${AIRFLOW_VERSION}" --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-${AIRFLOW_VERSION}/constraints-${PYTHON_VERSION}.txt"
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run DAG integration tests
        run: |
          pytest tests/dags/test_dag_integrity.py -q

  dependency-governance:
    runs-on: ubuntu-latest
    needs: syntax-check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies for governance checks
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock.txt -r requirements-dev.txt

      - name: Generate transitive license report
        run: |
          mkdir -p build
          pip-licenses --format=json --with-urls --output-file build/licenses.json

      - name: Enforce license policy
        run: |
          python scripts/check_licenses.py build/licenses.json
